<!DOCTYPE html>
<html>

<head>
  <title>智能助手</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="sidebar.css">
</head>

<body>
  <div class="sidebar-container">
    <div class="controls-primary">
      <button id="summarizePageButton" data-i18n="summarizePage">总结当前网页</button>
      <button id="extractContentButton" data-i18n="extractContent">提取全文作为引用</button>
      <button id="toggleMoreActionsButton" class="icon-button" title="更多操作">⚙️</button>
    </div>

    <div id="moreActionsMenu" class="controls-secondary" style="display: none;">
      <button id="splitChatButton" data-i18n="splitChat">分割当前对话</button>
      <button id="viewArchivedChatsButton" data-i18n="viewArchived">查看已存档对话</button>
      <button id="managePromptsButton" data-i18n="managePrompts">管理 Prompt</button>
      <button id="regexExtractButton" data-i18n="regexExtractTool" style="display: none;">正则提取工具</button>
    </div>

    <div id="regexToolPanel" class="regex-tool-panel" style="display: none;">
      <div class="regex-tool-header">
        <strong data-i18n="regexToolTitle">正则提取工具</strong>
        <button id="closeRegexToolButton" type="button" data-i18n="close">关闭</button>
      </div>
      <label for="regexToolPattern" data-i18n="regexToolPatternLabel">正则表达式</label>
      <textarea id="regexToolPattern" rows="3" spellcheck="false"></textarea>
      <div class="regex-tool-row">
        <div class="regex-flags-field">
          <label for="regexToolFlags" data-i18n="regexToolFlagsLabel">标志</label>
          <input id="regexToolFlags" type="text" placeholder="gim">
        </div>
        <label class="regex-checkbox">
          <input id="regexToolUseFullText" type="checkbox">
          <span data-i18n="regexToolUseFullText">完整可见文本</span>
        </label>
      </div>
      <div id="regexToolStatus" class="regex-tool-status"></div>
      <div class="regex-preview-grid">
        <div class="regex-preview-pane">
          <label for="regexToolSource" data-i18n="regexToolSourceLabel">网页内容</label>
          <textarea id="regexToolSource" rows="5" readonly></textarea>
        </div>
        <div class="regex-preview-pane">
          <label for="regexToolResult" data-i18n="regexToolResultLabel">匹配结果</label>
          <textarea id="regexToolResult" rows="5" readonly></textarea>
        </div>
      </div>
      <div class="regex-tool-actions">
        <button id="refreshRegexToolButton" type="button" data-i18n="refreshRegexTool">刷新网页内容</button>
        <button id="designRegexButton" type="button" data-i18n="designRegexWithAi">设计正则</button>
        <button id="copyRegexResultButton" type="button" data-i18n="copyRegexResult">复制匹配结果</button>
      </div>
    </div>

    <div class="prompt-shortcuts-container">
      <h4 data-i18n="promptShortcuts">Prompt 快捷方式:</h4>
      <div id="promptShortcuts" class="prompt-shortcuts">
      </div>
    </div>

    <div class="chat-area">
      <div id="chatOutput">
      </div>

      <div id="selectedImagePreviewContainer" style="display:none; margin-bottom: 5px; text-align: center;">
      </div>
      <button id="clearSelectedImageButton" data-i18n="clearImage"
        style="display: none; margin: 0 auto 8px auto; font-size: 0.8em; padding: 3px 8px; width: fit-content; background-color: var(--control-button-bg); color: var(--control-button-text); border: none; border-radius: var(--border-radius); cursor:pointer;">清除图片</button>

      <div id="selectedTextPreview"
        style="display:none; font-style: italic; color: gray; padding: 5px; border: 1px dashed #ccc; margin-bottom: 5px;">
        <span data-i18n="quoteContent">引用内容:</span> <span id="selectedTextContent"></span>
        <button id="clearSelectedTextButton" data-i18n="clear" style="margin-left: 5px; font-size: 0.8em;">清除</button>
      </div>
      <textarea id="chatInput" placeholder="输入消息或使用快捷方式..."></textarea>
      <div class="send-area-container">
        <button id="sendMessageButton" data-i18n="send">发送</button>
        <span class="shortcut-hint" data-i18n="sendShortcut">Cmd+Enter</span>
        <button id="clearAllHistoryButton" title="清除所有历史">🗑️</button>
      </div>
    </div>
  </div>
  <script src="/libs/marked.min.js"></script>
  <script src="sidebar.js"></script>
</body>

</html>
